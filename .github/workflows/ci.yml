name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'charts/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'charts/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g. v1, v2, latest)'
        required: true
        default: 'latest'

jobs:
  # ════════════════════════════════════════════
  # JOB 1 — SAST
  # ════════════════════════════════════════════
  sast:
    name: SAST - Bandit
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r src/ -f json -o bandit-report.json || true
          bandit -r src/ -f txt || true

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json

  # ════════════════════════════════════════════
  # JOB 2 — SCA
  # ════════════════════════════════════════════
  sca:
    name: SCA - Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Trivy SCA scan
        run: |
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --format json \
            --output trivy-fs-report.json || true
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --format table || true

      - name: Upload SCA report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sca-report
          path: trivy-fs-report.json

  # ════════════════════════════════════════════
  # JOB 3 — Build, Scan, Test & Push
  # ════════════════════════════════════════════
  build:
    name: Build, Scan, Test & Push
    runs-on: ubuntu-latest
    needs: [ sast, sca ]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-4)
            echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: myintwl/python-app:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan Docker image with Trivy
        run: |
          trivy image \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            --format json \
            --output trivy-image-report.json \
            myintwl/python-app:${{ env.IMAGE_TAG }} || true
          trivy image \
            --scanners vuln,secret \
            --severity HIGH,CRITICAL \
            --format table \
            myintwl/python-app:${{ env.IMAGE_TAG }} || true

      - name: Upload image scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.json

      - name: Start Flask container for DAST
        run: |
          docker run -d --name flask-test -p 5000:5000 myintwl/python-app:${{ env.IMAGE_TAG }}
          for i in {1..15}; do
            if curl -s http://localhost:5000/api/v1/health > /dev/null 2>&1; then
              echo "Flask is ready!"
              break
            fi
            echo "Attempt $i/15 - waiting..."
            sleep 2
          done

      - name: Run DAST - OWASP ZAP
        run: |
          docker run --rm \
            --network host \
            -v $(pwd):/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5000 \
            -r zap-report.html \
            -J zap-report.json \
            -I || true

      - name: Upload DAST report
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            zap-report.html
            zap-report.json

      - name: Run functional tests
        run: |
          curl --fail --retry 5 --retry-delay 2 http://localhost:5000/api/v1/health
          curl --fail --retry 5 --retry-delay 2 http://localhost:5000/api/v1/details
          echo "All functional tests passed!"

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: myintwl/python-app:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Build successful!"
          echo "📦 Image : myintwl/python-app:${{ env.IMAGE_TAG }}"
          echo "🔖 Tag   : ${{ env.IMAGE_TAG }}"
          echo "🔑 SHA   : ${{ github.sha }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "👤 Actor : ${{ github.actor }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Clean up
        if: always()
        run: |
          docker stop flask-test || true
          docker rm flask-test || true
          docker image prune -f

  # ════════════════════════════════════════════
  # JOB 4 — Publish Security Report to GitHub Pages
  # ════════════════════════════════════════════
  publish-report:
    name: Publish Security Report
    runs-on: ubuntu-latest
    needs: [ build ]
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Generate HTML security dashboard
        run: |
          mkdir -p gh-pages

          # ── Parse Bandit SAST ──
          BANDIT_FILE="reports/bandit-sast-report/bandit-report.json"
          if [ -f "$BANDIT_FILE" ]; then
            BANDIT_HIGH=$(jq '[.results[] | select(.issue_severity=="HIGH")] | length' $BANDIT_FILE 2>/dev/null || echo 0)
            BANDIT_MED=$(jq '[.results[] | select(.issue_severity=="MEDIUM")] | length' $BANDIT_FILE 2>/dev/null || echo 0)
            BANDIT_LOW=$(jq '[.results[] | select(.issue_severity=="LOW")] | length' $BANDIT_FILE 2>/dev/null || echo 0)
            BANDIT_ROWS=$(jq -r '.results[] | "<tr><td>\(.filename)</td><td>\(.test_name)</td><td class=\"sev-\(.issue_severity | ascii_downcase)\">\(.issue_severity)</td><td>\(.issue_text)</td><td>\(.line_number)</td></tr>"' $BANDIT_FILE 2>/dev/null || echo "<tr><td colspan=5>No issues found</td></tr>")
          else
            BANDIT_HIGH=0; BANDIT_MED=0; BANDIT_LOW=0
            BANDIT_ROWS="<tr><td colspan=5>Report not available</td></tr>"
          fi

          # ── Parse Trivy SCA ──
          TRIVY_FS_FILE="reports/trivy-sca-report/trivy-fs-report.json"
          if [ -f "$TRIVY_FS_FILE" ]; then
            TRIVY_CRITICAL=$(jq '[.. | objects | select(.Severity=="CRITICAL")] | length' $TRIVY_FS_FILE 2>/dev/null || echo 0)
            TRIVY_HIGH=$(jq '[.. | objects | select(.Severity=="HIGH")] | length' $TRIVY_FS_FILE 2>/dev/null || echo 0)
            TRIVY_ROWS=$(jq -r '.. | objects | select(.Severity?) | "<tr><td>\(.VulnerabilityID // "N/A")</td><td>\(.PkgName // "N/A")</td><td class=\"sev-\(.Severity | ascii_downcase)\">\(.Severity)</td><td>\(.Title // "N/A")</td><td>\(.InstalledVersion // "N/A")</td><td>\(.FixedVersion // "N/A")</td></tr>"' $TRIVY_FS_FILE 2>/dev/null | head -50 || echo "<tr><td colspan=6>No issues found</td></tr>")
          else
            TRIVY_CRITICAL=0; TRIVY_HIGH=0
            TRIVY_ROWS="<tr><td colspan=6>Report not available</td></tr>"
          fi

          # ── Parse Trivy Image ──
          TRIVY_IMG_FILE="reports/trivy-image-report/trivy-image-report.json"
          if [ -f "$TRIVY_IMG_FILE" ]; then
            IMG_CRITICAL=$(jq '[.. | objects | select(.Severity=="CRITICAL")] | length' $TRIVY_IMG_FILE 2>/dev/null || echo 0)
            IMG_HIGH=$(jq '[.. | objects | select(.Severity=="HIGH")] | length' $TRIVY_IMG_FILE 2>/dev/null || echo 0)
            IMG_ROWS=$(jq -r '.. | objects | select(.Severity?) | "<tr><td>\(.VulnerabilityID // "N/A")</td><td>\(.PkgName // "N/A")</td><td class=\"sev-\(.Severity | ascii_downcase)\">\(.Severity)</td><td>\(.Title // "N/A")</td><td>\(.InstalledVersion // "N/A")</td><td>\(.FixedVersion // "N/A")</td></tr>"' $TRIVY_IMG_FILE 2>/dev/null | head -50 || echo "<tr><td colspan=6>No issues found</td></tr>")
          else
            IMG_CRITICAL=0; IMG_HIGH=0
            IMG_ROWS="<tr><td colspan=6>Report not available</td></tr>"
          fi

          # ── Parse ZAP DAST ──
          ZAP_FILE="reports/zap-dast-report/zap-report.json"
          if [ -f "$ZAP_FILE" ]; then
            ZAP_HIGH=$(jq '[.site[].alerts[] | select(.riskcode=="3")] | length' $ZAP_FILE 2>/dev/null || echo 0)
            ZAP_MED=$(jq '[.site[].alerts[] | select(.riskcode=="2")] | length' $ZAP_FILE 2>/dev/null || echo 0)
            ZAP_LOW=$(jq '[.site[].alerts[] | select(.riskcode=="1")] | length' $ZAP_FILE 2>/dev/null || echo 0)
            ZAP_ROWS=$(jq -r '.site[].alerts[] | "<tr><td>\(.alert)</td><td class=\"sev-\(if .riskcode=="3" then "high" elif .riskcode=="2" then "medium" else "low" end)\">\(.riskdesc)</td><td>\(.desc | gsub("<[^>]+>"; "") | .[0:100])</td><td>\(.solution | gsub("<[^>]+>"; "") | .[0:100])</td></tr>"' $ZAP_FILE 2>/dev/null || echo "<tr><td colspan=4>No issues found</td></tr>")
          else
            ZAP_HIGH=0; ZAP_MED=0; ZAP_LOW=0
            ZAP_ROWS="<tr><td colspan=4>Report not available</td></tr>"
          fi

          # ── Build HTML Dashboard ──
          cat > gh-pages/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8"/>
            <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
            <title>Security Scan Report — myintwl/python-app</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; }
              header { background: #161b22; border-bottom: 1px solid #30363d; padding: 20px 40px; display: flex; align-items: center; gap: 16px; }
              header h1 { font-size: 20px; font-weight: 600; color: #f0f6fc; }
              header .meta { font-size: 13px; color: #8b949e; margin-top: 4px; }
              .container { max-width: 1200px; margin: 0 auto; padding: 32px 40px; }
              .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
              .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
              .card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; margin-bottom: 12px; }
              .card .tool { font-size: 18px; font-weight: 700; color: #f0f6fc; margin-bottom: 8px; }
              .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; margin: 2px; }
              .badge-critical { background: #3d1f1f; color: #f85149; border: 1px solid #f85149; }
              .badge-high     { background: #2d1f0f; color: #e3b341; border: 1px solid #e3b341; }
              .badge-medium   { background: #1f2d1f; color: #3fb950; border: 1px solid #3fb950; }
              .badge-low      { background: #1f2533; color: #58a6ff; border: 1px solid #58a6ff; }
              .section { margin-bottom: 40px; }
              .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #30363d; }
              .section-header h2 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
              .section-header .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
              .tag-sast { background: #1f2d3d; color: #58a6ff; }
              .tag-sca  { background: #2d1f3d; color: #bc8cff; }
              .tag-dast { background: #2d1f1f; color: #f85149; }
              .tag-img  { background: #1f2d1f; color: #3fb950; }
              table { width: 100%; border-collapse: collapse; font-size: 13px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; }
              th { background: #21262d; padding: 10px 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #8b949e; border-bottom: 1px solid #30363d; }
              td { padding: 10px 14px; border-bottom: 1px solid #21262d; vertical-align: top; word-break: break-word; max-width: 250px; }
              tr:last-child td { border-bottom: none; }
              tr:hover td { background: #1c2128; }
              .sev-critical { color: #f85149; font-weight: 700; }
              .sev-high     { color: #e3b341; font-weight: 700; }
              .sev-medium   { color: #3fb950; font-weight: 600; }
              .sev-low      { color: #58a6ff; }
              footer { text-align: center; padding: 24px; font-size: 12px; color: #8b949e; border-top: 1px solid #30363d; margin-top: 40px; }
            </style>
          </head>
          <body>
            <header>
              <div>
                <h1>🔐 Security Scan Report</h1>
                <div class="meta">
                  📦 myintwl/python-app &nbsp;|&nbsp;
                  🌿 ${{ github.ref_name }} &nbsp;|&nbsp;
                  🔑 ${{ github.sha }} &nbsp;|&nbsp;
                  👤 ${{ github.actor }} &nbsp;|&nbsp;
                  🕐 $(date -u '+%Y-%m-%d %H:%M UTC')
                </div>
              </div>
            </header>

            <div class="container">

              <!-- Summary Cards -->
              <div class="summary-grid">
                <div class="card">
                  <h3>SAST — Bandit</h3>
                  <div class="tool">Python Code</div>
                  <span class="badge badge-high">High: ${BANDIT_HIGH}</span>
                  <span class="badge badge-medium">Med: ${BANDIT_MED}</span>
                  <span class="badge badge-low">Low: ${BANDIT_LOW}</span>
                </div>
                <div class="card">
                  <h3>SCA — Trivy FS</h3>
                  <div class="tool">Dependencies</div>
                  <span class="badge badge-critical">Critical: ${TRIVY_CRITICAL}</span>
                  <span class="badge badge-high">High: ${TRIVY_HIGH}</span>
                </div>
                <div class="card">
                  <h3>Container — Trivy</h3>
                  <div class="tool">Docker Image</div>
                  <span class="badge badge-critical">Critical: ${IMG_CRITICAL}</span>
                  <span class="badge badge-high">High: ${IMG_HIGH}</span>
                </div>
                <div class="card">
                  <h3>DAST — OWASP ZAP</h3>
                  <div class="tool">Live App</div>
                  <span class="badge badge-high">High: ${ZAP_HIGH}</span>
                  <span class="badge badge-medium">Med: ${ZAP_MED}</span>
                  <span class="badge badge-low">Low: ${ZAP_LOW}</span>
                </div>
              </div>

              <!-- SAST Results -->
              <div class="section">
                <div class="section-header">
                  <h2>SAST Results</h2>
                  <span class="tag tag-sast">Bandit</span>
                </div>
                <table>
                  <thead><tr><th>File</th><th>Test</th><th>Severity</th><th>Issue</th><th>Line</th></tr></thead>
                  <tbody>${BANDIT_ROWS}</tbody>
                </table>
              </div>

              <!-- SCA Results -->
              <div class="section">
                <div class="section-header">
                  <h2>SCA Results — Filesystem</h2>
                  <span class="tag tag-sca">Trivy FS</span>
                </div>
                <table>
                  <thead><tr><th>CVE ID</th><th>Package</th><th>Severity</th><th>Title</th><th>Installed</th><th>Fixed In</th></tr></thead>
                  <tbody>${TRIVY_ROWS}</tbody>
                </table>
              </div>

              <!-- Container Scan Results -->
              <div class="section">
                <div class="section-header">
                  <h2>Container Image Scan</h2>
                  <span class="tag tag-img">Trivy Image</span>
                </div>
                <table>
                  <thead><tr><th>CVE ID</th><th>Package</th><th>Severity</th><th>Title</th><th>Installed</th><th>Fixed In</th></tr></thead>
                  <tbody>${IMG_ROWS}</tbody>
                </table>
              </div>

              <!-- DAST Results -->
              <div class="section">
                <div class="section-header">
                  <h2>DAST Results</h2>
                  <span class="tag tag-dast">OWASP ZAP</span>
                </div>
                <table>
                  <thead><tr><th>Alert</th><th>Risk</th><th>Description</th><th>Solution</th></tr></thead>
                  <tbody>${ZAP_ROWS}</tbody>
                </table>
              </div>

            </div>
            <footer>Generated by GitHub Actions &nbsp;·&nbsp; ${{ github.repository }} &nbsp;·&nbsp; Run #${{ github.run_number }}</footer>
          </body>
          </html>
          EOF

          echo "Dashboard generated successfully"
          ls -la gh-pages/

      - name: Copy ZAP HTML report
        run: |
          cp reports/zap-dast-report/zap-report.html gh-pages/zap-report.html 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          commit_message: "ci: update security scan report - run #${{ github.run_number }}"